<!DOCTYPE html>
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RTN Prayer Watch Generator</title>
  
<!-- Boogaloo font -->
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&display=swap" rel="stylesheet">
  
<style>
body {
  font-family: 'Boogaloo', Arial, sans-serif;
  text-align: center;
  background: #0f0f0f;
  color: white;
  padding: 20px;
}

.container {
  max-width: 400px;
  margin: auto;
}

input, textarea, button {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  border: none;
}

button {
  background: #ff6a00;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

canvas {
  width: 100%;
  margin-top: 20px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">
<h2>Tell us how prayer watch has been of help to you</h2>

<input type="file" id="upload" accept="image/*">
<input type="text" id="name" placeholder="Enter your name">
<textarea id="testimony" placeholder="Tell one thing you've learnt?" rows="4"></textarea>

<button onclick="generate()">Generate Flyer</button>

<canvas id="canvas" width="1080" height="1350"></canvas>

<a id="download" style="display:none;">
  <button>Download Flyer</button>
</a>
</div>

<script>
const template = new Image();
template.src = "template.png";

function drawCircularImage(ctx, img, x, y, size) {
  ctx.save();
  ctx.beginPath();
  ctx.arc(x + size/2, y + size/2, size/2, 0, Math.PI * 2);
  ctx.closePath();
  ctx.clip();
  ctx.drawImage(img, x, y, size, size);
  ctx.restore();
}

function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
  const words = text.split(' ');
  let line = '';

  for (let n = 0; n < words.length; n++) {
    let testLine = line + words[n] + ' ';
    let metrics = ctx.measureText(testLine);

    if (metrics.width > maxWidth && n > 0) {
      ctx.fillText(line, x, y);
      line = words[n] + ' ';
      y += lineHeight;
    } else {
      line = testLine;
    }
  }
  ctx.fillText(line, x, y);
}

function generate() {
  const file = document.getElementById("upload").files[0];
  const name = document.getElementById("name").value;
  const testimony = document.getElementById("testimony").value;

  if (!file) return alert("Upload your image");

  const reader = new FileReader();

  reader.onload = function(e) {
    const img = new Image();

    img.onload = function() {
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");

      // Background (fix transparency issue)
      ctx.fillStyle = "#1a0f0a";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw user image (circle)
      drawCircularImage(ctx, img, 390, 300, 300);

      // Draw template overlay
      ctx.drawImage(template, 0, 0, 1080, 1350);

      // TEXT SETTINGS
      ctx.fillStyle = "#ffffff";
      ctx.textAlign = "center";

      // Auto-resize name
      let fontSize = 50;
      do {
        ctx.font = "bold " + fontSize + "px Arial";
        fontSize--;
      } while (ctx.measureText(name).width > 700);

      ctx.fillText(name, 540, 720);

      // Testimony
      ctx.font = "32px Arial";
      wrapText(ctx, testimony, 540, 820, 600, 40);

      // Enable download
      const link = document.getElementById("download");
      link.href = canvas.toDataURL("image/png");
      link.download = "prayer-watch.png";
      link.style.display = "block";
    };

    img.src = e.target.result;
  };

  reader.readAsDataURL(file);
}
</script>

</body>
</html>
